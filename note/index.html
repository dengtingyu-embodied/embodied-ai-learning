<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>具身智能论文笔记</title>
    <link rel="stylesheet" href="./styles.css?v=20260721-fulltext-search" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">EI</span>
          <div>
            <h1>具身智能论文笔记</h1>
            <p id="statusText">正在加载仓库笔记</p>
          </div>
        </div>
        <a class="repo-link" href="https://github.com/dengtingyu-embodied/embodied-ai-learning/tree/main/notes" target="_blank" rel="noreferrer">notes/</a>
      </header>

      <main class="workspace">
        <aside class="sidebar" aria-label="论文列表">
          <label class="search">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.35-4.35M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z"/></svg>
            <input id="searchInput" type="search" placeholder="搜索标题、作者或笔记正文" aria-label="全文搜索笔记" autocomplete="off" />
          </label>

          <p id="paperCount" class="paper-count" aria-live="polite"></p>
          <div id="paperList" class="paper-list" aria-label="论文分类树"></div>
        </aside>

        <article class="note-viewer" aria-live="polite">
          <div id="emptyState" class="empty-state" hidden>
            <h2 id="emptyTitle">还没有笔记</h2>
            <p id="emptyMessage">把 Markdown 文件放进仓库的 notes/ 文件夹，然后 push，网站会自动更新。</p>
          </div>

          <div id="noteContent">
            <header class="note-head">
              <div class="note-kicker" id="noteStatus"></div>
              <h2 id="noteTitle"></h2>
              <p id="noteMeta" class="note-meta"></p>
              <p id="noteSummary" class="note-summary"></p>
              <div id="noteTags" class="tag-row"></div>
              <a id="pdfLink" class="pdf-link" href="#" target="_blank" rel="noreferrer" hidden>打开 PDF</a>
            </header>
            <section id="markdownBody" class="markdown-body"></section>
          </div>
        </article>
      </main>
    </div>

    <script src="./app.js?v=20260721-fulltext-search" defer></script>
  </body>
</html>
